# Application config
spring.application.name=ledgerflow
server.port=8080

# Oracle Database connection (real database with schema.sql already executed)
spring.datasource.url=jdbc:oracle:thin:@localhost:1521/XEPDB1
spring.datasource.username=ledgerflow
spring.datasource.password=pass123
spring.datasource.driver-class-name=oracle.jdbc.OracleDriver

spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.connection-timeout=30000

# JPA — 'none' means don't touch the database schema at all,
# since we already created tables with schema.sql
spring.jpa.database-platform=org.hibernate.dialect.OracleDialect
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=false

# Session timeout
server.servlet.session.timeout=60m

logging.level.com.ledgerflow=INFO
