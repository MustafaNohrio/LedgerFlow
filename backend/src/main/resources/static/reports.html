<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>Reports - LedgerFlow</title>
  <link rel="stylesheet" href="style.css"/>
</head>
<body>
<div class="app-layout">
  <aside class="sidebar" id="sidebar"></aside>
  <div class="main-content">
    <div class="top-bar">
      <h1>Reports</h1>
      <button class="btn btn-ghost btn-sm" onclick="window.location.href=API+'/reports/monthly-sales/csv'">⬇ Export Sales CSV</button>
    </div>
    <div class="page-body" id="page-body">

      <!-- Monthly Sales -->
      <div class="card">
        <div class="card-header">
          <h2>Monthly Sales — Current Year</h2>
        </div>
        <div class="card-body">
          <div id="monthly-chart"><div class="empty-state"><div class="spinner"></div></div></div>
          <div class="table-wrap mt-2">
            <table>
              <thead><tr><th>Month</th><th>Orders</th><th>Revenue</th></tr></thead>
              <tbody id="monthly-table"><tr class="loading-row"><td colspan="3"><div class="spinner"></div></td></tr></tbody>
            </table>
          </div>
        </div>
      </div>

      <div class="two-col gap-top">

        <!-- Top Selling -->
        <div class="card">
          <div class="card-header"><h2>Top Selling Products</h2></div>
          <div class="table-wrap">
            <table>
              <thead><tr><th>Product</th><th>Category</th><th>Units Sold</th><th>Revenue</th></tr></thead>
              <tbody id="top-table"><tr class="loading-row"><td colspan="4"><div class="spinner"></div></td></tr></tbody>
            </table>
          </div>
        </div>

        <!-- Payment Methods -->
        <div class="card">
          <div class="card-header"><h2>Payment Method Summary</h2></div>
          <div class="table-wrap">
            <table>
              <thead><tr><th>Method</th><th>Transactions</th><th>Total Collected</th></tr></thead>
              <tbody id="pay-table"><tr class="loading-row"><td colspan="3"><div class="spinner"></div></td></tr></tbody>
            </table>
          </div>
        </div>

      </div>

      <!-- Customer Purchase History -->
      <div class="card gap-top">
        <div class="card-header"><h2>Customer Purchase Summary</h2></div>
        <div class="table-wrap">
          <table>
            <thead><tr><th>Customer</th><th>City</th><th>Orders</th><th>Total Spent</th><th>Last Order</th></tr></thead>
            <tbody id="cust-table"><tr class="loading-row"><td colspan="5"><div class="spinner"></div></td></tr></tbody>
          </table>
        </div>
      </div>

      <!-- Low Stock Report -->
      <div class="card gap-top">
        <div class="card-header"><h2>Low Stock Products</h2></div>
        <div class="table-wrap">
          <table>
            <thead><tr><th>Product</th><th>SKU</th><th>Category</th><th>Stock</th><th>Unit Price</th></tr></thead>
            <tbody id="stock-table"><tr class="loading-row"><td colspan="5"><div class="spinner"></div></td></tr></tbody>
          </table>
        </div>
      </div>

    </div>
  </div>
</div>
<script src="script.js"></script>
<script>
requireAuth();
buildSidebar();

if (!hasRole('ADMIN','MANAGER')) {
  document.getElementById('page-body').innerHTML = `
    <div class="no-access">
      <div class="icon">🚫</div>
      <h2>Access Denied</h2>
      <p>Reports are available to Admin and Manager accounts only.</p>
    </div>`;
} else {
  loadAllReports();
}

async function loadAllReports() {
  await Promise.all([
    loadMonthlySales(),
    loadTopProducts(),
    loadPaymentMethods(),
    loadCustomerHistory(),
    loadLowStock()
  ]);
}

async function loadMonthlySales() {
  try {
    const data = await api('/reports/monthly-sales');
    const chartEl = document.getElementById('monthly-chart');
    const tableEl = document.getElementById('monthly-table');

    if (!data.length) {
      chartEl.innerHTML = '<p class="text-muted">No sales data for this year yet</p>';
      tableEl.innerHTML = '<tr><td colspan="3" class="text-muted" style="padding:12px">No data</td></tr>';
      return;
    }

    const max = Math.max(...data.map(r => Number(r.revenue) || 0));
    chartEl.innerHTML = `<div class="bar-chart">${data.map(r => {
      const rev = Number(r.revenue) || 0;
      const h   = max > 0 ? Math.max(4, Math.round(rev / max * 120)) : 4;
      return `<div class="bar-col">
        <div class="bar-val">${rev >= 1000 ? Math.round(rev/1000)+'k' : rev}</div>
        <div class="bar" style="height:${h}px" title="${r.month}: ${money(rev)}"></div>
        <div class="bar-lbl">${r.month}</div>
      </div>`;
    }).join('')}</div>`;

    tableEl.innerHTML = data.map(r => `
      <tr>
        <td>${r.month}</td>
        <td>${r.orderCount}</td>
        <td style="font-weight:600">${money(r.revenue)}</td>
      </tr>`).join('');
  } catch(e) {
    document.getElementById('monthly-table').innerHTML =
      `<tr><td colspan="3"><div class="alert alert-error">${e.message}</div></td></tr>`;
  }
}

async function loadTopProducts() {
  const tbody = document.getElementById('top-table');
  try {
    const data = await api('/reports/top-products');
    if (!data.length) { tbody.innerHTML = '<tr><td colspan="4" class="text-muted" style="padding:12px">No sales data</td></tr>'; return; }
    tbody.innerHTML = data.map((r, i) => `
      <tr>
        <td><span style="color:var(--gray-400);margin-right:6px">${i+1}.</span>${r.productName}</td>
        <td>${r.categoryName}</td>
        <td><strong>${r.totalUnits}</strong></td>
        <td style="font-weight:600">${money(r.totalRevenue)}</td>
      </tr>`).join('');
  } catch(e) {
    tbody.innerHTML = `<tr><td colspan="4"><div class="alert alert-error">${e.message}</div></td></tr>`;
  }
}

async function loadPaymentMethods() {
  const tbody = document.getElementById('pay-table');
  try {
    const data = await api('/reports/payment-methods');
    if (!data.length) { tbody.innerHTML = '<tr><td colspan="3" class="text-muted" style="padding:12px">No payments yet</td></tr>'; return; }
    tbody.innerHTML = data.map(r => `
      <tr>
        <td><span class="badge badge-confirmed">${r.paymentMethod}</span></td>
        <td>${r.txnCount}</td>
        <td style="font-weight:600">${money(r.totalAmount)}</td>
      </tr>`).join('');
  } catch(e) {
    tbody.innerHTML = `<tr><td colspan="3"><div class="alert alert-error">${e.message}</div></td></tr>`;
  }
}

async function loadCustomerHistory() {
  const tbody = document.getElementById('cust-table');
  try {
    const data = await api('/reports/customer-history');
    if (!data.length) { tbody.innerHTML = '<tr><td colspan="5" class="text-muted" style="padding:12px">No data</td></tr>'; return; }
    tbody.innerHTML = data.map(r => `
      <tr>
        <td><strong>${r.customerName}</strong></td>
        <td>${r.city || '—'}</td>
        <td>${r.totalOrders}</td>
        <td style="font-weight:600">${money(r.totalSpent)}</td>
        <td>${fmtDate(r.lastOrderDate)}</td>
      </tr>`).join('');
  } catch(e) {
    tbody.innerHTML = `<tr><td colspan="5"><div class="alert alert-error">${e.message}</div></td></tr>`;
  }
}

async function loadLowStock() {
  const tbody = document.getElementById('stock-table');
  try {
    const data = await api('/reports/low-stock');
    if (!data.length) {
      tbody.innerHTML = '<tr><td colspan="5" style="padding:12px;color:var(--green);font-weight:500">✓ All products sufficiently stocked</td></tr>';
      return;
    }
    tbody.innerHTML = data.map(r => `
      <tr>
        <td>${r.productName}</td>
        <td style="font-family:monospace;font-size:.78rem">${r.skuCode}</td>
        <td>${r.categoryName}</td>
        <td>${stockBadge(r.stockQuantity)}</td>
        <td>${money(r.unitPrice)}</td>
      </tr>`).join('');
  } catch(e) {
    tbody.innerHTML = `<tr><td colspan="5"><div class="alert alert-error">${e.message}</div></td></tr>`;
  }
}
</script>
</body>
</html>
