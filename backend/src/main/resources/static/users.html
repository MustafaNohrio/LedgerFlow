<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>Users - LedgerFlow</title>
  <link rel="stylesheet" href="style.css"/>
</head>
<body>
<div class="app-layout">
  <aside class="sidebar" id="sidebar"></aside>
  <div class="main-content">
    <div class="top-bar">
      <h1>Users</h1>
      <button id="add-btn" class="btn btn-primary btn-sm" onclick="openAddModal()">+ Add User</button>
    </div>
    <div class="page-body" id="page-body">
      <div class="card">
        <div class="table-wrap">
          <table>
            <thead><tr><th>#</th><th>Name</th><th>Username</th><th>Email</th><th>Role</th><th>Status</th><th>Actions</th></tr></thead>
            <tbody id="users-table">
              <tr class="loading-row"><td colspan="7"><div class="spinner"></div></td></tr>
            </tbody>
          </table>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- Add User Modal -->
<div class="modal-overlay" id="user-modal">
  <div class="modal">
    <div class="modal-header">
      <h2>Add Staff Account</h2>
      <button class="close-btn" onclick="closeModal()">✕</button>
    </div>
    <div class="modal-body">
      <div id="modal-msg"></div>
      <div class="form-row">
        <div class="form-group">
          <label>Full Name *</label>
          <input id="f-name" type="text" placeholder="e.g. Ahmed Khan"/>
        </div>
        <div class="form-group">
          <label>Username *</label>
          <input id="f-uname" type="text" placeholder="e.g. ahmed.khan"/>
        </div>
      </div>
      <div class="form-group">
        <label>Email *</label>
        <input id="f-email" type="email" placeholder="ahmed@ledgerflow.pk"/>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>Password * (min 6 chars)</label>
          <input id="f-pass" type="password" placeholder="••••••••"/>
        </div>
        <div class="form-group">
          <label>Role *</label>
          <select id="f-role"><option value="">Loading...</option></select>
        </div>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="closeModal()">Cancel</button>
      <button class="btn btn-primary" id="save-btn" onclick="saveUser()">Create Account</button>
    </div>
  </div>
</div>

<script src="script.js"></script>
<script>
requireAuth();
buildSidebar();

if (!hasRole('ADMIN')) {
  document.getElementById('page-body').innerHTML = `
    <div class="no-access">
      <div class="icon">🚫</div>
      <h2>Admin Only</h2>
      <p>User management is restricted to administrators.</p>
    </div>`;
  document.getElementById('add-btn').style.display = 'none';
} else {
  loadUsers();
  loadRoles();
}

async function loadUsers() {
  const tbody = document.getElementById('users-table');
  try {
    const users = await api('/users');
    if (!users.length) {
      tbody.innerHTML = '<tr><td colspan="7" class="empty-state">No users found</td></tr>';
      return;
    }
    tbody.innerHTML = users.map(u => `
      <tr>
        <td class="text-muted">${u.userId}</td>
        <td><strong>${u.fullName}</strong></td>
        <td style="font-family:monospace">${u.username}</td>
        <td>${u.email}</td>
        <td>${roleBadge(u.role?.roleName || '?')}</td>
        <td><span class="badge badge-${u.isActive === 'Y' ? 'y' : 'n'}">${u.isActive === 'Y' ? 'Active' : 'Inactive'}</span></td>
        <td>
          <button class="btn btn-ghost btn-sm" onclick="toggleUser(${u.userId},'${u.isActive}')">
            ${u.isActive === 'Y' ? 'Deactivate' : 'Activate'}
          </button>
        </td>
      </tr>`).join('');
  } catch(e) {
    tbody.innerHTML = `<tr><td colspan="7"><div class="alert alert-error">${e.message}</div></td></tr>`;
  }
}

async function loadRoles() {
  try {
    const roles = await api('/auth/roles');
    document.getElementById('f-role').innerHTML =
      '<option value="">Select role...</option>'
      + roles.map(r => `<option value="${r.roleId}">${r.roleName}</option>`).join('');
  } catch(e) {}
}

function openAddModal() {
  document.getElementById('modal-msg').innerHTML = '';
  ['f-name','f-uname','f-email','f-pass'].forEach(id => document.getElementById(id).value = '');
  document.getElementById('f-role').value = '';
  document.getElementById('user-modal').classList.add('open');
}

function closeModal() {
  document.getElementById('user-modal').classList.remove('open');
}

async function saveUser() {
  const msg   = document.getElementById('modal-msg');
  const name  = document.getElementById('f-name').value.trim();
  const uname = document.getElementById('f-uname').value.trim();
  const email = document.getElementById('f-email').value.trim();
  const pass  = document.getElementById('f-pass').value;
  const roleId= document.getElementById('f-role').value;

  msg.innerHTML = '';
  if (!name || !uname || !email || !pass || !roleId) {
    msg.innerHTML = '<div class="alert alert-error">All fields are required.</div>'; return;
  }
  if (pass.length < 6) {
    msg.innerHTML = '<div class="alert alert-error">Password must be at least 6 characters.</div>'; return;
  }

  const btn = document.getElementById('save-btn');
  btn.disabled = true; btn.textContent = 'Creating...';

  try {
    await api('/auth/register', {
      method: 'POST',
      body: JSON.stringify({ fullName: name, username: uname, email, password: pass, roleId: parseInt(roleId) })
    });
    toast('Account created successfully', 'success');
    closeModal();
    loadUsers();
  } catch(e) {
    msg.innerHTML = `<div class="alert alert-error">${e.message}</div>`;
  } finally {
    btn.disabled = false; btn.textContent = 'Create Account';
  }
}

async function toggleUser(id, currentStatus) {
  const action = currentStatus === 'Y' ? 'deactivate' : 'activate';
  if (!confirm(`Are you sure you want to ${action} this account?`)) return;
  try {
    await api(`/users/${id}/toggle`, { method: 'PATCH' });
    toast(`Account ${action}d`, 'success');
    loadUsers();
  } catch(e) {
    toast(e.message, 'error');
  }
}
</script>
</body>
</html>
