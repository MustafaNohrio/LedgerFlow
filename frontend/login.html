<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>LedgerFlow - Login</title>
  <link rel="stylesheet" href="style.css"/>
</head>
<body>
<div class="login-page">
  <div class="login-box">
    <h1>LedgerFlow</h1>
    <p class="subtitle">Sign in to your account</p>

    <div id="msg"></div>

    <div class="form-group">
      <label for="username">Username</label>
      <input id="username" type="text" placeholder="Enter username" autofocus
             onkeydown="if(event.key==='Enter') login()"/>
    </div>
    <div class="form-group">
      <label for="password">Password</label>
      <input id="password" type="password" placeholder="Enter password"
             onkeydown="if(event.key==='Enter') login()"/>
    </div>

    <button class="btn btn-primary btn-full" id="login-btn" onclick="login()">
      Sign In
    </button>


  </div>
</div>

<script src="script.js"></script>
<script>
  if (getUser()) window.location.href = 'dashboard.html';

  async function login() {
    const msg = document.getElementById('msg');
    const btn = document.getElementById('login-btn');
    const username = document.getElementById('username').value.trim();
    const password = document.getElementById('password').value;

    msg.innerHTML = '';
    if (!username || !password) {
      msg.innerHTML = '<div class="alert alert-error">Please enter your username and password.</div>';
      return;
    }

    btn.textContent = 'Signing in...';
    btn.disabled = true;

    try {
      const user = await api('/auth/login', { method: 'POST', body: JSON.stringify({ username, password }) });
      saveUser(user);
      window.location.href = 'dashboard.html';
    } catch(e) {
      msg.innerHTML = `<div class="alert alert-error">${e.message}</div>`;
      btn.textContent = 'Sign In';
      btn.disabled = false;
    }
  }
</script>
</body>
</html>
